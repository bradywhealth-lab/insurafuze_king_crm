name: Bug Report
description: Something is broken in Elite CRM
title: "fix: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! Fill out the sections below to help diagnose it quickly.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I click X, Y happens instead of Z."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Exact steps to reproduce the bug consistently.
      placeholder: |
        1. Go to the Leads page
        2. Click "Add Lead"
        3. Fill in the form
        4. Click Save
        5. See error in console
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include any error messages or console output.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: App area
      options:
        - Leads / Contacts
        - Pipeline
        - AI Features
        - Sequences / Automation
        - Carriers & Documents
        - Content / Social
        - Dashboard / Stats
        - Authentication
        - API / Backend
        - Database
        - Other
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How much does this impact your work?
      options:
        - Critical — app is unusable / data loss
        - High — major feature broken
        - Medium — feature partially broken, workaround exists
        - Low — minor annoyance
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Where did you see this?
      placeholder: |
        - Browser: Chrome 120 / Safari 17
        - OS: macOS 14 / Windows 11
        - Screen size: Desktop / Mobile
        - Is this production or dev?
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: |
        Paste any browser console errors, server logs, or attach screenshots.
        Tip: browser DevTools → Console tab → copy errors.
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I've searched existing issues and this is not a duplicate
          required: true
        - label: I can reproduce this consistently (not a one-off fluke)
          required: false
