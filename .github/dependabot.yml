# Dependabot — auto-creates PRs for outdated & vulnerable dependencies.
version: 2

updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - automated
    groups:
      radix:
        patterns:
          - "@radix-ui/*"
        update-types:
          - minor
          - patch
      tanstack:
        patterns:
          - "@tanstack/*"
        update-types:
          - minor
          - patch
      prisma:
        patterns:
          - "prisma"
          - "@prisma/*"
      types:
        patterns:
          - "@types/*"
        update-types:
          - minor
          - patch
    commit-message:
      prefix: "deps"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
      - automated
    commit-message:
      prefix: "ci"
