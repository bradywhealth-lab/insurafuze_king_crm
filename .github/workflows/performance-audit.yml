# ─────────────────────────────────────────────────────────────────────────────
# Performance Audit (Lighthouse CI)
# ─────────────────────────────────────────────────────────────────────────────
# WHAT IT DOES:
#   Runs Google Lighthouse against your production app URL on every PR and
#   weekly. Reports:
#     • Performance score (Core Web Vitals: LCP, FID, CLS)
#     • Accessibility score
#     • Best Practices score
#     • SEO score
#
#   Posts results as a PR comment with a score summary table.
#   Fails the workflow if Performance score drops below 50 (configurable).
#
# WHY IT MATTERS (solo dev):
#   Elite CRM is a professional app your clients will judge on feel.
#   Slow dashboards lose trust. This catches performance regressions before
#   they reach users — e.g., if you accidentally import a 2MB library or
#   add an un-optimized image.
#
# REQUIRED SECRETS:
#   APP_BASE_URL — your production app URL (must be publicly accessible)
#
# NOTE: Lighthouse cannot run against localhost in GitHub Actions.
# It requires a publicly accessible URL. If your app isn't public yet,
# disable this workflow until you deploy.
# ─────────────────────────────────────────────────────────────────────────────

name: Performance Audit

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "tailwind.config.ts"
      - "next.config.ts"
  schedule:
    # Every Monday at 09:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    # Skip if no app URL is configured
    if: ${{ secrets.APP_BASE_URL != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Run Lighthouse CI
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            ${{ secrets.APP_BASE_URL }}
          configPath: ".github/lighthouse-config.json"
          uploadArtifacts: true
          temporaryPublicStorage: true
        continue-on-error: true

      - name: Post Lighthouse results to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            // Parse Lighthouse results and format as comment
            const results = ${{ steps.lighthouse.outputs.manifest || '[]' }};
            if (!results || results.length === 0) {
              console.log('No Lighthouse results to report');
              return;
            }

            const result = results[0];
            const summary = result.summary;

            const score = (val) => {
              const pct = Math.round(val * 100);
              const emoji = pct >= 90 ? '🟢' : pct >= 50 ? '🟡' : '🔴';
              return `${emoji} ${pct}`;
            };

            const body = `## 🔦 Lighthouse Audit Results

            | Category | Score |
            |----------|-------|
            | Performance | ${score(summary.performance)} |
            | Accessibility | ${score(summary.accessibility)} |
            | Best Practices | ${score(summary['best-practices'])} |
            | SEO | ${score(summary.seo)} |

            🟢 ≥ 90  🟡 50–89  🔴 < 50

            [View full report](${result.url})`;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.data.find(c =>
              c.body.startsWith('## 🔦 Lighthouse') && c.user.type === 'Bot'
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
