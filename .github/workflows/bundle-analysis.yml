# ──────────────────────────────────────────────────────────────
# Bundle Analysis — tracks JS bundle size on every PR.
# Posts a comment with the size diff so regressions are visible.
# ──────────────────────────────────────────────────────────────
name: Bundle Analysis

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  analyze:
    name: Analyze bundle size
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile

      - name: Build PR branch
        run: bun run build
        env:
          DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"

      - name: Measure PR bundle
        id: pr_size
        run: |
          STANDALONE=$(du -sb .next/standalone/ | awk '{print $1}')
          STATIC=$(du -sb .next/static/ | awk '{print $1}')
          JS_SIZE=$(find .next/static -name '*.js' -exec du -cb {} + | tail -1 | awk '{print $1}')
          echo "standalone=$STANDALONE" >> "$GITHUB_OUTPUT"
          echo "static=$STATIC" >> "$GITHUB_OUTPUT"
          echo "js=$JS_SIZE" >> "$GITHUB_OUTPUT"

      - name: Checkout main for comparison
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-branch

      - name: Build main branch
        run: |
          cd main-branch
          bun install --frozen-lockfile
          bun run build || echo "Main build failed — skipping comparison"
        env:
          DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"

      - name: Measure main bundle
        id: main_size
        run: |
          if [ -d "main-branch/.next/standalone" ]; then
            STANDALONE=$(du -sb main-branch/.next/standalone/ | awk '{print $1}')
            STATIC=$(du -sb main-branch/.next/static/ | awk '{print $1}')
            JS_SIZE=$(find main-branch/.next/static -name '*.js' -exec du -cb {} + | tail -1 | awk '{print $1}')
          else
            STANDALONE=0; STATIC=0; JS_SIZE=0
          fi
          echo "standalone=$STANDALONE" >> "$GITHUB_OUTPUT"
          echo "static=$STATIC" >> "$GITHUB_OUTPUT"
          echo "js=$JS_SIZE" >> "$GITHUB_OUTPUT"

      - name: Post size comparison
        uses: actions/github-script@v7
        with:
          script: |
            function fmt(bytes) {
              if (bytes === 0) return '0 B';
              const k = 1024;
              const sizes = ['B', 'KB', 'MB', 'GB'];
              const i = Math.floor(Math.log(Math.abs(bytes) || 1) / Math.log(k));
              return (bytes / Math.pow(k, i)).toFixed(1) + ' ' + sizes[i];
            }
            function delta(pr, main) {
              const d = pr - main;
              const pct = main > 0 ? ((d / main) * 100).toFixed(1) : 'N/A';
              const icon = d > 0 ? '🔺' : d < 0 ? '🔽' : '➖';
              return `${icon} ${fmt(d)} (${pct}%)`;
            }

            const pr = {
              standalone: parseInt('${{ steps.pr_size.outputs.standalone }}'),
              static:     parseInt('${{ steps.pr_size.outputs.static }}'),
              js:         parseInt('${{ steps.pr_size.outputs.js }}'),
            };
            const main = {
              standalone: parseInt('${{ steps.main_size.outputs.standalone }}'),
              static:     parseInt('${{ steps.main_size.outputs.static }}'),
              js:         parseInt('${{ steps.main_size.outputs.js }}'),
            };

            const body = `## Bundle Size Report
            | Metric | Main | PR | Delta |
            |--------|------|----|-------|
            | Standalone | ${fmt(main.standalone)} | ${fmt(pr.standalone)} | ${delta(pr.standalone, main.standalone)} |
            | Static assets | ${fmt(main.static)} | ${fmt(pr.static)} | ${delta(pr.static, main.static)} |
            | JS total | ${fmt(main.js)} | ${fmt(pr.js)} | ${delta(pr.js, main.js)} |

            _Auto-generated by Bundle Analysis workflow._`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.includes('Bundle Size Report'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
