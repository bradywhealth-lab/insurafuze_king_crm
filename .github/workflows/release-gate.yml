# ─────────────────────────────────────────────────────────────────────────────
# Release Gate
# ─────────────────────────────────────────────────────────────────────────────
# WHAT IT DOES:
#   Runs `scripts/release-gate.mjs` on every PR that targets the `main` branch.
#   That script executes: lint → build → prisma generate → tests — in sequence,
#   aborting on the first failure.
#
# WHY IT MATTERS (solo dev):
#   Think of this as your "merge button bodyguard". You cannot accidentally merge
#   broken code into main. Configure this as a *required* status check in
#   GitHub → Settings → Branches → Branch protection rules for `main`.
#
# SECRETS REQUIRED: none
# ─────────────────────────────────────────────────────────────────────────────

name: Release Gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you running this manually?"
        required: false
        default: "Manual trigger"

jobs:
  release-gate:
    name: Release Gate
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-placeholder-secret-not-real
      NEXTAUTH_URL: http://localhost:3000
      INTERNAL_RUNNER_KEY: ci-placeholder
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run release gate
        run: node scripts/release-gate.mjs

      - name: Gate passed
        run: echo "✅ Release gate passed — safe to merge into main"
