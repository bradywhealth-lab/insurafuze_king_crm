# ──────────────────────────────────────────────────────────────
# PR Automation — auto-labels PRs by file paths, adds a review
# checklist comment, and assigns the repo owner.
# ──────────────────────────────────────────────────────────────
name: PR Automation

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  label:
    name: Auto-label PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          sync-labels: true

  checklist:
    name: Add review checklist
    if: github.event.action == 'opened'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const files = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100,
            });
            const paths = files.data.map(f => f.filename);

            const hasSchema   = paths.some(p => p.startsWith('prisma/'));
            const hasAPI       = paths.some(p => p.includes('/api/'));
            const hasUI        = paths.some(p => p.match(/\.(tsx|css)$/));
            const hasDeps      = paths.some(p => p === 'package.json' || p === 'bun.lock');
            const hasEnv       = paths.some(p => p === '.env.example');

            let checklist = `### Pre-merge Checklist\n`;
            checklist += `- [ ] Changes tested locally\n`;
            checklist += `- [ ] No console errors in browser\n`;

            if (hasSchema) {
              checklist += `- [ ] **DB**: Prisma migration created / schema push verified\n`;
              checklist += `- [ ] **DB**: Seed data updated if needed\n`;
              checklist += `- [ ] **DB**: RLS policies reviewed\n`;
            }
            if (hasAPI) {
              checklist += `- [ ] **API**: Endpoint tested with sample requests\n`;
              checklist += `- [ ] **API**: Error handling covers edge cases\n`;
              checklist += `- [ ] **API**: Org-scoping (multi-tenancy) verified\n`;
            }
            if (hasUI) {
              checklist += `- [ ] **UI**: Responsive on mobile viewport\n`;
              checklist += `- [ ] **UI**: Dark mode looks correct\n`;
            }
            if (hasDeps) {
              checklist += `- [ ] **Deps**: New packages vetted for bundle size & license\n`;
            }
            if (hasEnv) {
              checklist += `- [ ] **Env**: .env.example updated with new variables\n`;
            }

            checklist += `\n_Auto-generated by PR Automation workflow._`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: checklist,
            });
