# ─────────────────────────────────────────────────────────────────────────────
# Stale Issue & PR Management
# ─────────────────────────────────────────────────────────────────────────────
# WHAT IT DOES:
#   Runs every day at 01:00 UTC. It:
#     1. Marks issues with no activity in 30 days as "stale" and leaves a comment
#     2. Closes stale issues after 7 more days with no response
#     3. Marks PRs with no activity in 14 days as "stale"
#     4. Closes stale PRs after 7 more days
#     5. Never marks/closes items labeled "pinned", "security", or "roadmap"
#
# WHY IT MATTERS (solo dev):
#   As a solo developer, your issue tracker will fill up with old ideas, bugs
#   that never got fixed, and PRs that got abandoned. Without automation, this
#   becomes overwhelming noise. This keeps your backlog clean automatically.
#   You'll receive email notifications when items get marked stale — a gentle
#   nudge to either address or consciously close them.
#
# SECRETS REQUIRED: none (uses built-in GITHUB_TOKEN)
# ─────────────────────────────────────────────────────────────────────────────

name: Stale Issues & PRs

on:
  schedule:
    # Every day at 01:00 UTC
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark & Close Stale Items
    runs-on: ubuntu-latest

    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # ── Issues ──────────────────────────────────────────────────────────
          days-before-issue-stale: 30
          days-before-issue-close: 7
          stale-issue-label: "stale"
          stale-issue-message: >
            👋 This issue has been inactive for 30 days. It will be automatically
            closed in 7 days unless there is new activity.

            If this is still relevant, please leave a comment or remove the
            `stale` label. If this is a bug that still exists, adding a 🐛
            reaction helps prioritize it.
          close-issue-message: >
            🔒 Closing due to inactivity. If this issue is still relevant,
            feel free to reopen it with updated context.

          # ── PRs ─────────────────────────────────────────────────────────────
          days-before-pr-stale: 14
          days-before-pr-close: 7
          stale-pr-label: "stale"
          stale-pr-message: >
            👋 This PR has been inactive for 14 days. It will be automatically
            closed in 7 days unless there is new activity.

            If you're still working on this, please push a commit or leave
            a comment. If it's blocked on a dependency, mention it here.
          close-pr-message: >
            🔒 Closing due to inactivity. Feel free to reopen when you're
            ready to continue.

          # ── Never auto-close these ──────────────────────────────────────────
          exempt-issue-labels: "pinned,security,roadmap,blocked"
          exempt-pr-labels: "pinned,security,do-not-close"

          # Limit operations per run to stay within rate limits
          operations-per-run: 100
