# ──────────────────────────────────────────────────────────────
# Stale — auto-closes issues and PRs that go dormant.
# Keeps your backlog clean without manual triage.
# ──────────────────────────────────────────────────────────────
name: Stale Issues & PRs

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 6 AM UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been inactive for 30 days. It will be closed in 7 days
            unless there is new activity. Add the `keep-open` label to prevent this.
          stale-pr-message: >
            This PR has been inactive for 14 days. It will be closed in 7 days
            unless updated. Add the `keep-open` label to prevent this.
          close-issue-message: "Closed due to inactivity. Reopen if still needed."
          close-pr-message: "Closed due to inactivity. Reopen if still needed."
          days-before-issue-stale: 30
          days-before-pr-stale: 14
          days-before-issue-close: 7
          days-before-pr-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: "keep-open,bug,critical"
          exempt-pr-labels: "keep-open,wip"
