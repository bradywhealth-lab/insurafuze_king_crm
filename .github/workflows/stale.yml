# ──────────────────────────────────────────────────────────────
# Stale — auto-closes issues and PRs that go dormant.
# Keeps your backlog clean without manual triage.
# ──────────────────────────────────────────────────────────────
name: Stale Issue Management

on:
  schedule:
    - cron: "45 6 * * 1" # Weekly Monday 6:45 AM UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark and close stale items
    runs-on: ubuntu-latest
    steps:
      - name: Mark stale issues and pull requests
        uses: actions/stale@v10
        with:
          stale-issue-message: >
            This issue has been inactive for 30 days. It will be closed in 7 days
            unless there is new activity. Add the `keep-open` label to prevent this.
          stale-pr-message: >
            This PR has been inactive for 21 days. It will be closed in 7 days
            unless updated. Add the `keep-open` label to prevent this.
          close-issue-message: "Closed due to inactivity. Reopen if still needed."
          close-pr-message: "Closed due to inactivity. Reopen if still needed."
          stale-issue-label: stale
          stale-pr-label: stale
          days-before-issue-stale: 30
          days-before-pr-stale: 21
          days-before-issue-close: 7
          days-before-pr-close: 7
          exempt-issue-labels: "keep-open,bug,critical,priority:high,security"
          exempt-pr-labels: "keep-open,wip,priority:high"
