# ─────────────────────────────────────────────────────────────────────────────
# Release & Changelog Generator
# ─────────────────────────────────────────────────────────────────────────────
# WHAT IT DOES:
#   Triggered when you push a version tag (e.g., v1.2.3) or merge to main.
#   It:
#     1. Generates a structured changelog from merged PR titles since the
#        last tag (using Conventional Commits grouping)
#     2. Creates a GitHub Release with that changelog
#     3. Updates CHANGELOG.md in the repo automatically
#     4. Runs the release gate one final time before publishing
#
# HOW TO TRIGGER A RELEASE:
#   git tag v1.2.3 -m "Release v1.2.3"
#   git push origin v1.2.3
#
# WHY IT MATTERS (solo dev):
#   You get a professional changelog and GitHub Release automatically.
#   No manual "what did I change this month?" archaeology.
#   Your changelog becomes a record of what shipped and when.
#
# VERSION STRATEGY:
#   • patch (v1.2.x): bug fixes — use when PRs are all `fix:` type
#   • minor (v1.x.0): new features — use when PRs include `feat:` types
#   • major (vx.0.0): breaking changes — use when PRs include `feat!:` or `BREAKING CHANGE:`
#
# SECRETS REQUIRED: none (uses built-in GITHUB_TOKEN)
# ─────────────────────────────────────────────────────────────────────────────

name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v1.2.3)"
        required: true

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Generate changelog
        id: changelog
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.tag.outputs.tag }}';

            // Get the previous tag
            let prevTag;
            try {
              const tags = await github.rest.repos.listTags({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 10
              });
              const tagNames = tags.data.map(t => t.name).filter(t => t !== tag);
              prevTag = tagNames[0] || null;
            } catch (e) {
              prevTag = null;
            }

            // Get commits since last tag
            let commits;
            try {
              const comparison = prevTag
                ? await github.rest.repos.compareCommits({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    base: prevTag,
                    head: tag,
                  })
                : await github.rest.repos.listCommits({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    per_page: 50
                  });

              commits = (comparison.data.commits || comparison.data)
                .map(c => c.commit.message.split('\n')[0])
                .filter(Boolean);
            } catch (e) {
              commits = [];
            }

            // Group by conventional commit type
            const groups = {
              '🚀 Features': [],
              '🐛 Bug Fixes': [],
              '⚡ Performance': [],
              '♻️  Refactoring': [],
              '📦 Dependencies': [],
              '🧪 Tests': [],
              '📝 Documentation': [],
              '🔧 Chores': [],
              '🔒 Security': [],
              '💥 Breaking Changes': [],
              'Other': []
            };

            const typeMap = {
              'feat': '🚀 Features',
              'fix': '🐛 Bug Fixes',
              'perf': '⚡ Performance',
              'refactor': '♻️  Refactoring',
              'deps': '📦 Dependencies',
              'chore(deps)': '📦 Dependencies',
              'test': '🧪 Tests',
              'docs': '📝 Documentation',
              'chore': '🔧 Chores',
              'ci': '🔧 Chores',
              'build': '🔧 Chores',
              'security': '🔒 Security',
            };

            for (const commit of commits) {
              const match = commit.match(/^(\w+)(?:\(([^)]+)\))?(!)?: (.+)/);
              if (match) {
                const [, type, scope, breaking, desc] = match;
                const key = breaking ? '💥 Breaking Changes' : (typeMap[`${type}(${scope})`] || typeMap[type] || 'Other');
                const label = scope ? `**${scope}**: ${desc}` : desc;
                groups[key].push(`- ${label}`);
              } else if (!commit.startsWith('Merge')) {
                groups['Other'].push(`- ${commit}`);
              }
            }

            let changelog = `## What's Changed\n\n`;
            for (const [section, items] of Object.entries(groups)) {
              if (items.length > 0) {
                changelog += `### ${section}\n${items.join('\n')}\n\n`;
              }
            }

            if (prevTag) {
              changelog += `\n**Full Changelog**: https://github.com/${context.repo.owner}/${context.repo.repo}/compare/${prevTag}...${tag}`;
            }

            core.setOutput('changelog', changelog);
            console.log('Generated changelog:\n', changelog);

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.tag.outputs.tag }}';
            const changelog = `${{ steps.changelog.outputs.changelog }}`;

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Elite CRM ${tag}`,
              body: changelog,
              draft: false,
              prerelease: tag.includes('-'),
            });

            console.log(`✅ Release ${tag} created`);
