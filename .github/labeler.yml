# ─────────────────────────────────────────────────────────────────────────────
# Auto-Labeler Configuration
# Used by the auto-label.yml workflow.
# Maps file path patterns to GitHub labels.
# Labels must be created in the repo before they can be applied.
# ─────────────────────────────────────────────────────────────────────────────

"area: database":
  - changed-files:
      - any-glob-to-any-file:
          - "prisma/**"
          - "src/lib/db.ts"

"area: api":
  - changed-files:
      - any-glob-to-any-file:
          - "src/app/api/**"

"area: ui":
  - changed-files:
      - any-glob-to-any-file:
          - "src/app/**/*.tsx"
          - "src/components/**"
          - "src/app/globals.css"
          - "tailwind.config.ts"

"area: ai":
  - changed-files:
      - any-glob-to-any-file:
          - "src/app/api/ai/**"
          - "src/lib/zai.ts"

"area: auth":
  - changed-files:
      - any-glob-to-any-file:
          - "src/lib/request-context.ts"
          - "src/lib/internal-runner.ts"

"area: ci":
  - changed-files:
      - any-glob-to-any-file:
          - ".github/**"

"area: scripts":
  - changed-files:
      - any-glob-to-any-file:
          - "scripts/**"
          - ".zscripts/**"

"area: tests":
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.test.ts"
          - "**/*.test.tsx"
          - "**/*.spec.ts"
          - "vitest.config.ts"
          - "src/test/**"

"area: deps":
  - changed-files:
      - any-glob-to-any-file:
          - "package.json"
          - "bun.lock"
          - "package-lock.json"

"area: config":
  - changed-files:
      - any-glob-to-any-file:
          - "next.config.ts"
          - "tsconfig.json"
          - "eslint.config.mjs"
          - ".env.example"
          - "prisma.config.ts"

"area: carriers":
  - changed-files:
      - any-glob-to-any-file:
          - "src/app/api/carriers/**"

"area: sequences":
  - changed-files:
      - any-glob-to-any-file:
          - "src/app/api/sequences/**"
